<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roma Importadora — Junho 2026</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Segoe UI',-apple-system,Roboto,Helvetica,Arial,sans-serif;background:#1a0006;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  .shellbar{background:#1a0006;color:#fff;flex:0 0 auto;box-shadow:0 2px 16px rgba(0,0,0,.35);z-index:10;}
  .shellbar-in{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:20px;padding:0 22px;}
  .shell-brand{font-weight:800;font-size:14px;letter-spacing:.5px;padding:14px 0;white-space:nowrap;}
  .shell-brand span{color:#c9a24b;}
  .shell-tabs{display:flex;gap:2px;margin-left:auto;}
  .shell-tab{background:none;border:none;color:#e8c9d0;font-family:inherit;font-size:13px;font-weight:700;padding:16px 16px;cursor:pointer;border-bottom:3px solid transparent;transition:.15s;letter-spacing:.2px;}
  .shell-tab:hover{color:#fff;}
  .shell-tab.active{color:#fff;border-bottom-color:#c9a24b;}
  .frames{flex:1 1 auto;position:relative;background:#f4f6f9;}
  .frames iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;}
  .frames iframe.active{display:block;}
  @media(max-width:600px){ .shell-brand{display:none;} .shell-tabs{margin:0 auto;} .shell-tab{padding:14px 12px;} }
</style>
</head>
<body>
  <div class="shellbar">
    <div class="shellbar-in">
      <div class="shell-brand">IMPORTADORA <span>ROMA</span> · JUNHO 2026</div>
      <div class="shell-tabs">
        <button class="shell-tab active" onclick="frame('f-rel',this)">📄 Relatório de Junho</button>
        <button class="shell-tab" onclick="frame('f-b2b',this)">📊 Apresentação B2B</button>
      </div>
    </div>
  </div>
  <div class="frames">
    <iframe id="f-rel" class="active" src="relatorio.html?v=20260707b" title="Relatório de Junho"></iframe>
    <iframe id="f-b2b" src="apresentacao-b2b.html?v=20260707b" title="Apresentação B2B" loading="lazy"></iframe>
  </div>
  <script>
    function frame(id,btn){
      document.querySelectorAll('.frames iframe').forEach(function(f){f.classList.remove('active');});
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('.shell-tab').forEach(function(t){t.classList.remove('active');});
      btn.classList.add('active');
    }
  </script>
</body>
</html>
